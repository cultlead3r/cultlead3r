<svg width="820" height="330" viewBox="0 0 820 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile bio</title>
  <desc id="desc">A dark cyberpunk-styled rendering of the profile bio.</desc>

  <style>
    /* Media queries in an SVG loaded via img match the image's own rendered
       width, so this swaps to the large-type layout when GitHub scales the
       badge down on narrow screens. */
    .mobile { display: none; }
    @media (max-width: 500px) {
      .desktop { display: none; }
      .mobile { display: inline; }
      /* keep the scene subtle behind the larger mobile type */
      .city { opacity: 0.5; }
      .sign { transform: translate(26px, -22px); }
    }

    .glitch {
      fill: #d14fff;
      text-shadow: 1.5px 0 rgba(0, 240, 255, 0.55), -1.5px 0 rgba(255, 45, 111, 0.55);
    }
    .f1 { animation: flicker 3.7s step-end infinite; }
    .f2 { animation: flicker 4.3s step-end infinite 1.1s; }
    .f3 { animation: flicker 5.1s step-end infinite 2.3s; }
    .f4 { animation: flicker 4.7s step-end infinite 0.6s; }
    @keyframes flicker {
      0%, 100% { fill-opacity: 1; }
      7%  { fill-opacity: 0.35; }
      9%  { fill-opacity: 1; }
      11% { fill-opacity: 0.6; }
      12% { fill-opacity: 1; }
      53% { fill-opacity: 0.25; }
      55% { fill-opacity: 1; }
    }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070c"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#130814"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5175bf" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#5175bf" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#d14fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.045"/>
    </pattern>
    <clipPath id="frame">
      <rect width="820" height="330" rx="18"/>
    </clipPath>
    <radialGradient id="cityglow">
      <stop offset="0" stop-color="#5e1ba8" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#3d1270" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#3d1270" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cityfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <mask id="citymask">
      <rect x="440" y="0" width="380" height="240" fill="url(#cityfade)"/>
    </mask>
  </defs>

  <rect width="820" height="330" rx="18" fill="url(#bg)"/>

  <g class="city" clip-path="url(#frame)">
    <ellipse cx="715" cy="100" rx="280" ry="180" fill="url(#cityglow)"/>
    <g mask="url(#citymask)">
      <path d="M520 0 H820 V26 L560 104 Z" fill="#120620" opacity="0.5"/>
      <path d="M772 0 H820 V190 L772 210 Z" fill="#1d0c33" opacity="0.4"/>
      <rect x="786" y="26" width="22" height="52" fill="#08030f" stroke="#7b4bb3" stroke-opacity="0.22"/>
      <g stroke="#7b4bb3" stroke-width="1.5" opacity="0.18" fill="none">
        <path d="M590 56 l44 -30"/>
        <path d="M600 60 l44 -30"/>
      </g>
      <rect x="700" y="116" width="48" height="116" fill="#000003"/>
      <rect x="698" y="114" width="52" height="120" fill="none" stroke="#3a1763" stroke-opacity="0.55"/>
      <rect x="690" y="110" width="68" height="6" fill="#10061d" opacity="0.85"/>
      <path d="M704 122 V228" stroke="#ff2d6f" stroke-width="1.5" opacity="0.3"/>
      <ellipse cx="724" cy="232" rx="58" ry="12" fill="#ff2d6f" opacity="0.05"/>
      <g class="sign" filter="url(#glow)">
        <rect x="694" y="64" width="60" height="34" rx="6" fill="#060210" fill-opacity="0.5" stroke="#6a5fd0" stroke-opacity="0.55" stroke-width="1.5"/>
        <text class="f4" x="724" y="89" text-anchor="middle" font-size="19" letter-spacing="6" fill="#a66dff" opacity="0.55">入口</text>
      </g>
    </g>
  </g>

  <rect x="1" y="1" width="818" height="328" rx="17" fill="none" stroke="#30363d"/>
  <rect width="820" height="330" rx="18" fill="url(#scanlines)"/>

  <g opacity="0.55">
    <path d="M42 46 H778" stroke="url(#signal)" stroke-width="1"/>
    <path d="M42 306 H778" stroke="url(#signal)" stroke-width="1"/>
    <path d="M82 28 V312" stroke="#5175bf" stroke-width="1" opacity="0.18"/>
    <path d="M738 28 V312" stroke="#d14fff" stroke-width="1" opacity="0.16"/>
  </g>

  <g class="desktop" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace">
    <text x="52" y="36" fill="#00f0ff" font-size="11" letter-spacing="3" opacity="0.95" filter="url(#glow)">SIGNAL // MYTH // MACHINE</text>
    <text x="52" y="74" fill="#e6edf3" font-size="20" font-weight="700">
      <tspan x="52" dy="0">I work in the static between decaying signals</tspan>
      <tspan x="52" dy="31">and collapsing mythologies, where <tspan class="glitch f1">machines</tspan></tspan>
      <tspan x="52" dy="31">have learned to <tspan class="glitch f2">lie.</tspan></tspan>
    </text>

    <g fill="#c9d1d9" font-size="18">
      <text x="68" y="196">— mapping hostile systems</text>
      <text x="68" y="232">— structuring ambiguity across networks, infrastructure, and <tspan class="glitch f3">myth</tspan></text>
      <text x="68" y="268">— building tools for those who live near the <tspan class="glitch f4">edge cases</tspan></text>
    </g>
  </g>

  <g class="mobile" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace">
    <text x="52" y="38" fill="#00f0ff" font-size="16" letter-spacing="2" opacity="0.95" filter="url(#glow)">SIGNAL // MYTH // MACHINE</text>
    <text x="52" y="80" fill="#e6edf3" font-size="28" font-weight="700">
      <tspan x="52" dy="0">I work in the static between decaying</tspan>
      <tspan x="52" dy="34">signals and collapsing mythologies,</tspan>
      <tspan x="52" dy="34">where <tspan class="glitch f1">machines</tspan> have learned to <tspan class="glitch f2">lie.</tspan></tspan>
    </text>

    <g fill="#c9d1d9" font-size="24">
      <text x="68" y="186">— mapping hostile systems</text>
      <text x="68" y="216">— structuring ambiguity across networks,</text>
      <text x="92" y="244">infrastructure, and <tspan class="glitch f3">myth</tspan></text>
      <text x="68" y="274">— building tools for those who live near</text>
      <text x="92" y="302">the <tspan class="glitch f4">edge cases</tspan></text>
    </g>
  </g>

  <g opacity="0.55" fill="none" stroke="#5175bf">
    <path d="M720 62 l18 0 l0 18"/>
    <path d="M100 292 l-18 0 l0 -18"/>
  </g>
</svg>
